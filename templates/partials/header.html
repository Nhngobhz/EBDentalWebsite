<header class="eb-header" id="ebHeader">
    <div class="logo">
        <div class="logo-icon"><i class="fas fa-tooth"></i></div>
        <div class="logo-text">EB <span>DENTAL</span></div>
    </div>
    <nav class="eb-nav-center" id="ebNav">
        <a href="{{ url_for('main.home') }}" class="{{ 'active' if request.endpoint == 'main.home' }}">Home</a>
        <a href="{{ url_for('catalog.products_catalog') }}" class="{{ 'active' if request.endpoint == 'catalog.products_catalog' }}">Products</a>
        <a href="{{ url_for('main.about') }}" class="{{ 'active' if request.endpoint == 'main.about' }}">About</a>
        <a href="{{ url_for('main.contact') }}" class="{{ 'active' if request.endpoint == 'main.contact' }}">Contact</a>
        <a href="{{ url_for('catalog.manuals') }}" class="{{ 'active' if request.endpoint == 'catalog.manuals' }}">📘 Manual</a>
    </nav>
    <div class="header-right">
        <img src="https://flagcdn.com/w40/kh.png" alt="KH" class="flag" />

        <span class="icon-btn quote-cart-icon" id="quoteCartIcon" title="Your Quote List">
            <i class="fas fa-shopping-cart"></i>
            <span class="quote-cart-badge" id="quoteCartBadge" style="display:none;">0</span>
        </span>
        {% if is_logged_in() %}
        <span class="header-account-name" style="font-size:0.8rem; color:var(--text-light); white-space:nowrap;" title="{{ current_account().email }}">
            <i class="fas fa-circle-user"></i> {{ current_account().name }}
        </span>
        {% if is_staff() %}
        <a class="profile-btn" href="{{ url_for('admin.dashboard') }}" title="Admin Dashboard"><i class="fas fa-gauge"></i></a>
        {% endif %}
        <a class="profile-btn" href="{{ url_for('auth.logout') }}" title="Log out" onclick="localStorage.removeItem('eb_quote_cart'); localStorage.removeItem('eb_quote_customer_info'); localStorage.removeItem('eb_quote_discount_type'); localStorage.removeItem('eb_quote_discount_value');"><i class="fas fa-right-from-bracket"></i></a>
        {% else %}
        <a class="profile-btn" href="{{ url_for('auth.login') }}" title="Profile / Login">
            <i class="fas fa-user"></i>
        </a>
        {% endif %}
    </div>
</header>
