<!-- Quote Cart Drawer — slides in, shows items added via "Add to Quote"
     with full line-item editing (code / qty / UOM / unit price / discount),
     plus a customer & quote info form matching EB Dental's official
     quotation template. "Download as PDF" renders a hidden print template
     (#quotePrintTemplate below) styled like the paper form and snapshots it
     with html2canvas — this is what lets Khmer text render correctly,
     since jsPDF's built-in fonts can't draw Khmer glyphs on their own. -->
<div class="quote-drawer-overlay" id="quoteDrawerOverlay"></div>
<div class="quote-drawer" id="quoteDrawer">
    <div class="quote-drawer-header">
        <h3><i class="fas fa-shopping-cart"></i> Your Quote List</h3>
        <button type="button" class="quote-drawer-close" id="quoteDrawerClose"><i class="fas fa-times"></i></button>
    </div>

    <div class="quote-drawer-body">
        <!-- Customer / quote info — mirrors the fields on the official
             EB Dental quotation form (clinic, contact, terms, staff). -->
        <div class="quote-info-form" id="quoteInfoForm">
            <div class="quote-info-toggle" id="quoteInfoToggle">
                <span><i class="fas fa-file-invoice"></i> Quote Info</span>
                <i class="fas fa-chevron-down toggle-caret"></i>
            </div>
            <div class="quote-info-fields" id="quoteInfoFields">
                <div class="quote-info-col">
                    <label>Clinic *
                        <input type="text" id="qiClinic" placeholder="Clinic name" required oninput="QuoteCart.saveInfoField('clinic', this.value)">
                    </label>
                    <label>Contact Tel *
                        <input type="text" id="qiTel" placeholder="071 458 4444" required oninput="QuoteCart.saveInfoField('tel', this.value)">
                    </label>
                    <label>Address *
                        <input type="text" id="qiAddress" placeholder="Clinic address" required oninput="QuoteCart.saveInfoField('address', this.value)">
                    </label>
                    <label>Contact Person
                        <input type="text" id="qiContactPerson" placeholder="098 882 953" oninput="QuoteCart.saveInfoField('contactPerson', this.value)">
                    </label>
                </div>
                <div class="quote-info-col">
                    <label>Payment Term
                        <input type="text" id="qiPaymentTerm" placeholder="COD" oninput="QuoteCart.saveInfoField('paymentTerm', this.value)">
                    </label>
                    <label>Installation Term
                        <input type="text" id="qiInstallTerm" placeholder="Free within Phnom Penh" oninput="QuoteCart.saveInfoField('installTerm', this.value)">
                    </label>
                </div>
            </div>
            <!-- C. Code / Salesperson / User are no longer typed in here - they're always
                 server-derived (see routers/orders.py::create_order) and only appear on the
                 resulting printed quote, sourced from the Order API response. -->
        </div>

        <div class="quote-drawer-items" id="quoteDrawerItems">
            <!-- Populated by JS (renderItems in main.js) -->
        </div>
    </div>

    <div class="quote-drawer-footer">
        <!-- Order-level discount — either a percentage or a flat cash amount, separate
             from each product's own % discount (already baked into its unit price).
             Setting a discount is staff-only (product_management, enforced
             server-side too - see routers/orders.py::create_order); everyone else
             just sees the (read-only, always $0 for them) computed Discount amount.
             Defaults to 0%, meaning Grand Total = Sub-Total. -->
        <div class="quote-summary-rows">
            <div class="quote-summary-row">
                <span>Sub-Total</span>
                <span id="quoteSubTotal">$0.00</span>
            </div>
            <div class="quote-summary-row quote-discount-row">
                <span>
                    Discount
                    {% if has_permission('product_management') %}
                    <button type="button" class="quote-discount-edit-btn" id="quoteDiscountEditBtn" title="Set discount">
                        <i class="fas fa-pen"></i>
                    </button>
                    {% endif %}
                </span>
                <span id="quoteDiscountAmount">$0.00</span>
            </div>
            {% if has_permission('product_management') %}
            <div class="quote-discount-editor" id="quoteDiscountEditor">
                <select id="quoteDiscountType" onchange="QuoteCart.saveDiscountType(this.value)">
                    <option value="percent">%</option>
                    <option value="cash">$ Cash</option>
                </select>
                <input type="number" id="quoteDiscountValue" min="0" step="0.01" value="0" oninput="QuoteCart.saveDiscountValue(this.value)">
            </div>
            {% endif %}
            <div class="quote-summary-row quote-grand-total-row">
                <span>Grand Total</span>
                <span id="quoteGrandTotal">$0.00</span>
            </div>
        </div>
        <div class="quote-drawer-actions">
            <button type="button" class="quote-download-pdf-btn" id="quoteDownloadPdfBtn">
                <i class="fas fa-file-pdf"></i> Download as PDF
            </button>
        </div>
    </div>
</div>

<!-- Hidden print template — built and populated by QuoteCart.downloadPDF()
     right before capture, then snapshotted with html2canvas. Kept off-screen
     (not display:none — html2canvas can't render that) rather than deleted,
     so the same node is reused on every export. -->
<div class="quote-print-template" id="quotePrintTemplate"></div>
