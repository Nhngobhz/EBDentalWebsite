{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="login-overlay active" style="position: relative; inset: auto; min-height: 70vh; padding: 40px 0;">
    <div class="login-box">
        <div class="login-header">
            <div class="brand-icon"><i class="fas fa-tooth"></i></div>
            <div class="brand-text">
                <h2>EB Dental Account</h2>
                <p>Create an account to get started</p>
            </div>
        </div>

        <div class="tab-buttons">
            <a href="{{ url_for('auth.login') }}">Sign In</a>
            <a href="{{ url_for('auth.register') }}" class="active">Register</a>
        </div>

        <div class="tab-content active">
            <form id="registerForm" method="post" action="{{ url_for('auth.register') }}">
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" name="name" placeholder="Enter your full name" required />
                </div>
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" name="email" placeholder="Enter your email" required />
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" name="password" placeholder="Create a password" required />
                </div>
                <div class="form-group">
                    <label for="regPhone">Phone Number</label>
                    <input type="tel" id="regPhone" name="phone" placeholder="Enter your phone number" />
                </div>
                <div class="form-group">
                    <label for="regAddress">Address</label>
                    <input type="text" id="regAddress" name="address" placeholder="Enter your address" />
                </div>
                <button type="submit" class="btn-login" id="registerBtn"><i class="fas fa-user-plus"></i> Create Account</button>
            </form>
            <div class="login-footer">
                <span>Already have an account? <a href="{{ url_for('auth.login') }}">Sign In</a></span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
