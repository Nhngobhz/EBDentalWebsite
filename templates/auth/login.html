{% extends "base.html" %}

{% block title %}Sign In{% endblock %}

{% block content %}
<div class="login-overlay active" style="position: relative; inset: auto; min-height: 70vh; padding: 40px 0;">
    <div class="login-box">
        <div class="login-header">
            <div class="brand-icon"><i class="fas fa-tooth"></i></div>
            <div class="brand-text">
                <h2>EB Dental Account</h2>
                <p>Sign in to access your dashboard</p>
            </div>
        </div>

        <div class="tab-buttons">
            <a href="{{ url_for('auth.login') }}" class="active">Sign In</a>
            <a href="{{ url_for('auth.register') }}">Register</a>
        </div>

        <div class="tab-content active" id="loginTabContent">
            <form id="loginForm" method="post" action="{{ url_for('auth.login') }}">
                <div class="form-group">
                    <label for="loginEmailInput">Email</label>
                    <input type="email" id="loginEmailInput" name="email" placeholder="Enter your email" required />
                </div>
                <div class="form-group">
                    <label for="loginPasswordInput">Password</label>
                    <input type="password" id="loginPasswordInput" name="password" placeholder="Enter your password" required />
                </div>
                <div id="loginErrorMsg" class="login-error"></div>
                <button type="submit" class="btn-login" id="loginBtn"><i class="fas fa-lock"></i> Sign In</button>
            </form>
            <div class="login-footer">
                <span>Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a></span>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    const form = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('loginErrorMsg');

    function showError(message) {
        errorMsg.textContent = message;
        errorMsg.classList.add('show');
    }

    function hideError() {
        errorMsg.classList.remove('show');
    }

    async function attemptLogin(email, password) {
        const resp = await fetch(form.action, {
            method: 'POST',
            headers: {
                'Accept': 'application/json',
                'X-Requested-With': 'XMLHttpRequest',
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: new URLSearchParams({ email, password }),
        });
        return resp.json();
    }

    function onLoginSuccess(data) {
        // Same keys QuoteCart uses in main.js - a fresh login should never inherit
        // whatever was left in the cart by a previous visitor/session on this browser.
        localStorage.removeItem('eb_quote_cart');
        localStorage.removeItem('eb_quote_customer_info');
        localStorage.removeItem('eb_quote_discount_type');
        localStorage.removeItem('eb_quote_discount_value');
        window.location.href = data.redirect_url;
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const email = document.getElementById('loginEmailInput').value.trim();
        const password = document.getElementById('loginPasswordInput').value;

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

        try {
            const data = await attemptLogin(email, password);
            if (data.success) {
                onLoginSuccess(data);
                return;
            }
            if (data.reason === 'unverified') {
                // The waiting-for-confirmation screen now only lives on the register
                // page (right after signup) - someone landing here with an
                // unconfirmed account just gets told to go confirm it.
                showError(data.detail || 'Please confirm your email address before logging in.');
            } else {
                showError(data.detail || 'Incorrect email or password.');
            }
        } catch (err) {
            showError('Could not reach the server. Please check your connection and try again.');
        } finally {
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="fas fa-lock"></i> Sign In';
        }
    });
})();
</script>
{% endblock %}
